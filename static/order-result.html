<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Status - Vishleshak AI</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <link rel="alternate icon" href="/favicon.ico" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #7C3AED;
      --blue: #2563EB;
      --green: #25D366;
      --text: rgba(255,255,255,0.74);
      --muted: rgba(255,255,255,0.45);
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.11);
      --ink: #111827;
      --soft: #f8f7ff;
      --line: #e5e0f5;
    }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      background: linear-gradient(145deg, #0d0640 0%, #1a0a40 40%, #2d1b8a 70%, #1e0a4e 100%);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 48px;
      background: rgba(13, 6, 64, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #fff;
      font-size: 17px;
    }
    .logo-name { display: block; color: #fff; font-size: 1rem; font-weight: 700; }
    .logo-sub { display: block; margin-top: -2px; color: var(--muted); font-size: 0.67rem; }
    .back-btn {
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-btn:hover { color: #fff; }
    .hero {
      position: relative;
      padding: 22px 48px 32px;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 62% at 30% 42%, rgba(124,58,237,0.22), transparent 65%),
        radial-gradient(ellipse 48% 52% at 78% 42%, rgba(37,99,235,0.16), transparent 62%);
      pointer-events: none;
    }
    .hero-inner {
      position: relative;
      z-index: 1;
      width: min(960px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 0.96fr) minmax(320px, 400px);
      gap: 48px;
      align-items: start;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(124,58,237,0.20);
      border: 1px solid rgba(167,139,250,0.38);
      color: #c4b5fd;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin-top: 14px;
      color: #fff;
      font-size: clamp(1.9rem, 3.7vw, 2.85rem);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -1.5px;
    }
    h1 .accent {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      max-width: 500px;
      margin-top: 12px;
      color: var(--text);
      font-size: 0.96rem;
      line-height: 1.55;
    }
    .status-card {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      box-shadow: 0 28px 80px rgba(0,0,0,0.34);
      overflow: hidden;
      backdrop-filter: blur(16px);
    }
    .status-card-inner {
      position: relative;
      background: #fff;
      color: var(--ink);
      margin: 7px;
      border-radius: 14px;
      padding: 14px;
      min-height: 0;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .status-icon {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border-radius: 12px;
      background: #f3f0ff;
      color: var(--purple);
      font-size: 1.22rem;
      font-weight: 900;
    }
    .status-icon.success { background: #dcfce7; color: #16a34a; }
    .status-icon.warn { background: #fef3c7; color: #b45309; }
    .status-icon.error { background: #fee2e2; color: #dc2626; }
    .status-title { color: var(--ink); font-size: 1.02rem; font-weight: 900; }
    .status-sub { margin-top: 2px; color: #64748b; font-size: 0.8rem; line-height: 1.38; }
    video, .result-img {
      display: block;
      width: 100%;
      height: clamp(220px, 31vh, 285px);
      max-height: 285px;
      object-fit: contain;
      border-radius: 12px;
      background: #f8fafc;
      margin-bottom: 8px;
    }
    .script-box {
      margin-bottom: 8px;
      padding: 9px 11px;
      border: 1px solid #edf0f7;
      border-radius: 12px;
      background: #f8fafc;
      color: #52617a;
      font-size: 0.8rem;
      line-height: 1.38;
      white-space: pre-wrap;
    }
    .action-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: min(100%, 330px);
      margin: 10px 0 0 auto;
      padding: 8px;
      border: 1px solid rgba(229,224,245,0.95);
      border-radius: 14px;
      background: rgba(248,247,255,0.92);
      box-shadow: 0 14px 34px rgba(15,23,42,0.08);
    }
    .platform-share {
      display: none;
      margin-top: 28px;
      max-width: 500px;
    }
    .platform-share.ready { display: block; }
    .platform-share-title {
      margin-bottom: 12px;
      color: rgba(255,255,255,0.92);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .platform-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .platform-btn {
      min-height: 58px;
      display: grid;
      place-items: center;
      gap: 7px;
      border: 1px solid rgba(167,139,250,0.28);
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.78);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 900;
      backdrop-filter: blur(12px);
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }
    .platform-btn:hover {
      border-color: #a78bfa;
      background: rgba(124,58,237,0.18);
      color: #fff;
      transform: translateY(-1px);
    }
    .platform-icon {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      color: #fff;
    }
    .platform-icon svg {
      width: 16px;
      height: 16px;
      display: block;
      fill: currentColor;
    }
    .platform-icon.instagram { background: linear-gradient(135deg, #f97316, #db2777, #7c3aed); }
    .platform-icon.facebook { background: #1877f2; }
    .platform-icon.youtube { background: #ff0000; }
    .platform-icon.x { background: #000; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      border-radius: 10px;
      border: 0;
      padding: 0 16px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #fff;
      box-shadow: 0 12px 28px rgba(124,58,237,0.25);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 16px 34px rgba(124,58,237,0.32); }
    .btn-secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .btn-secondary:hover { background: #f8f7ff; border-color: #cfc6ed; }
    .timeline {
      display: grid;
      gap: 0;
      margin-top: 18px;
    }
    .tl-step {
      position: relative;
      display: flex;
      gap: 12px;
      padding: 10px 0 10px 22px;
      border-left: 2px solid #e5e7eb;
      margin-left: 9px;
    }
    .tl-step:last-child { border-left-color: transparent; }
    .tl-dot {
      position: absolute;
      left: -7px;
      top: 15px;
      width: 12px;
      height: 12px;
      border-radius: 99px;
      background: #cbd5e1;
      border: 2px solid #fff;
    }
    .tl-step.done .tl-dot { background: #22c55e; }
    .tl-step.active .tl-dot {
      background: var(--purple);
      box-shadow: 0 0 0 5px rgba(124,58,237,0.16);
    }
    .tl-label { color: var(--ink); font-size: 0.88rem; font-weight: 800; }
    .tl-step.done .tl-label { color: #16a34a; }
    .tl-step.active .tl-label { color: var(--purple); }
    .tl-sub { margin-top: 2px; color: #64748b; font-size: 0.78rem; }
    .order-id-row {
      margin-top: 8px;
      color: #64748b;
      font-size: 0.76rem;
      line-height: 1.5;
      word-break: break-all;
    }
    .hero-order-id {
      display: none;
      margin-top: 10px;
      color: rgba(255,255,255,0.54);
      font-size: 0.78rem;
      line-height: 1.5;
      word-break: break-all;
    }
    .hero-order-id.ready { display: block; }
    .new-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      color: rgba(255,255,255,0.72);
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
    }
    .new-order:hover { color: #fff; }
    .skeleton {
      height: 72px;
      border-radius: 12px;
      background: linear-gradient(90deg, #e5e7eb 25%, #f8fafc 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    .skeleton + .skeleton { height: 42px; margin-top: 12px; }
    .ring {
      width: 28px;
      height: 28px;
      border: 3px solid #ede9fe;
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { to { background-position: -200% 0; } }
    @media (max-width: 860px) {
      nav { padding: 12px 18px; }
      .hero { padding: 34px 18px 44px; }
      .hero-inner { grid-template-columns: 1fr; gap: 30px; }
      .hero-sub { max-width: none; }
    }
    @media (max-width: 520px) {
      .back-btn { font-size: 0.78rem; }
      h1 { font-size: 2rem; }
      .status-card-inner { padding: 16px; }
      .action-row { grid-template-columns: 1fr; }
      .platform-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="https://vishleshak.in">
      <div class="logo-icon">V</div>
      <div>
        <span class="logo-name">Vishleshak</span>
        <span class="logo-sub">AI Content Studio</span>
      </div>
    </a>
    <a class="back-btn" href="https://vishleshak.in">&larr; Back to Home</a>
  </nav>

  <main class="hero">
    <div class="hero-inner">
      <section>
        <div class="eyebrow">Order Status</div>
        <h1>Your Creative.<br><span class="accent">Almost There.</span></h1>
        <p class="hero-sub">Track your Vishleshak UGC order here. When the image or video is ready, you can download it and copy the caption from this page.</p>
        <a class="new-order" href="/order">&larr; Place a new order</a>
        <div id="hero-platform-share"></div>
        <div class="hero-order-id" id="hero-order-id"></div>
      </section>

      <section class="status-card" aria-label="Order status">
        <div class="status-card-inner" id="status-card">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const orderId = location.pathname.split("/").pop();
    let pollTimer = null;

    const STEPS = [
      { key: "analyzing", label: "Analyze product", sub: "Detect product and write script" },
      { key: "compositing_product", label: "Create presenter image", sub: "Blend model and product with AI" },
      { key: "generating_audio", label: "Generate voice", sub: "Create voiceover audio" },
      { key: "generating_video", label: "Generate video", sub: "Create the final ad" },
      { key: "processing_video", label: "Export final file", sub: "Prepare the download" }
    ];

    const CLOUDINARY_FALLBACK = `https://res.cloudinary.com/da9mechjr/raw/upload/vishleshak-orders/${orderId}.json`;

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function platformShareHtml(order, downloadUrl, isVideo) {
      const caption = order.script || (isVideo ? "My Vishleshak video ad is ready." : "My Vishleshak image ad is ready.");
      const pageUrl = window.location.href;
      const encodedCaption = encodeURIComponent(`${caption}\n\n${pageUrl}`);
      const encodedUrl = encodeURIComponent(pageUrl);
      const icons = {
        instagram: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2Zm-.2 2A3.6 3.6 0 0 0 4 7.6v8.8A3.6 3.6 0 0 0 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6A3.6 3.6 0 0 0 16.4 4H7.6Zm9.65 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg>`,
        facebook: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 8.5V6.75c0-.83.2-1.25 1.35-1.25H17V2.25C16.2 2.1 15.43 2 14.63 2 12.08 2 10.4 3.55 10.4 6.4v2.1H7.5V12h2.9v10H14V12h2.92l.45-3.5H14Z"/></svg>`,
        youtube: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.58 7.2a2.75 2.75 0 0 0-1.94-1.95C17.93 4.8 12 4.8 12 4.8s-5.93 0-7.64.45A2.75 2.75 0 0 0 2.42 7.2C2 8.92 2 12 2 12s0 3.08.42 4.8a2.75 2.75 0 0 0 1.94 1.95c1.71.45 7.64.45 7.64.45s5.93 0 7.64-.45a2.75 2.75 0 0 0 1.94-1.95C22 15.08 22 12 22 12s0-3.08-.42-4.8ZM10 15.2V8.8l5.2 3.2L10 15.2Z"/></svg>`,
        x: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.9 10.47 21.35 2h-1.77l-6.47 7.35L7.95 2H2l7.82 11.13L2 22h1.77l6.83-7.76L16.05 22H22l-8.1-11.53Zm-2.42 2.75-.79-1.1L4.38 3.3h2.72l5.08 7.1.79 1.1 6.61 9.24h-2.72l-5.38-7.52Z"/></svg>`
      };
      return `
        <div class="platform-share">
          <div class="platform-share-title">Post to platform</div>
          <div class="platform-grid">
            <a class="platform-btn" href="https://www.instagram.com/" target="_blank" rel="noopener">
              <span class="platform-icon instagram">${icons.instagram}</span>
              <span>Instagram</span>
            </a>
            <a class="platform-btn" href="https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}" target="_blank" rel="noopener">
              <span class="platform-icon facebook">${icons.facebook}</span>
              <span>Facebook</span>
            </a>
            <a class="platform-btn" href="https://www.youtube.com/upload" target="_blank" rel="noopener">
              <span class="platform-icon youtube">${icons.youtube}</span>
              <span>YouTube</span>
            </a>
            <a class="platform-btn" href="https://twitter.com/intent/tweet?text=${encodedCaption}" target="_blank" rel="noopener">
              <span class="platform-icon x">${icons.x}</span>
              <span>X</span>
            </a>
          </div>
        </div>`;
    }

    async function fetchFromCloudinary() {
      try {
        const resp = await fetch(CLOUDINARY_FALLBACK + "?t=" + Date.now());
        if (!resp.ok) return null;
        return await resp.json();
      } catch (e) {
        return null;
      }
    }

    async function poll() {
      try {
        const resp = await fetch(`/api/orders/${orderId}`);
        if (!resp.ok) {
          const saved = await fetchFromCloudinary();
          if (saved && saved.status === "completed") {
            render(saved);
            clearInterval(pollTimer);
          } else {
            renderError("Order not found. Please check your order ID.");
          }
          return;
        }

        const order = await resp.json();
        if (["pending", "payment_pending", "payment_error", "payment_failed", "failed"].includes(order.status)) {
          const saved = await fetchFromCloudinary();
          if (saved && saved.status === "completed") {
            render(saved);
            clearInterval(pollTimer);
            return;
          }
        }

        render(order);
        if (["completed", "rejected", "failed"].includes(order.status)) clearInterval(pollTimer);
      } catch (e) {
        console.error(e);
      }
    }

    function render(order) {
      const card = document.getElementById("status-card");
      const status = order.status;
      const safeId = escapeHtml(order.id || orderId);

      if (status === "payment_pending") {
        card.innerHTML = `
          <div class="status-row">
            <div class="status-icon warn">Rs</div>
            <div>
              <div class="status-title">Payment pending</div>
              <div class="status-sub">Complete payment to start automatic generation.</div>
            </div>
          </div>
          ${order.razorpay_payment_link_url ? `<div class="action-row"><a class="btn btn-primary" href="${escapeHtml(order.razorpay_payment_link_url)}" target="_blank" rel="noopener">Pay Rs. ${escapeHtml(order.amount_inr || "")}</a></div>` : ""}
          <div class="order-id-row">Order ID: ${safeId}</div>`;
        return;
      }

      if (status === "payment_error" || status === "payment_failed") {
        card.innerHTML = `
          <div class="status-row">
            <div class="status-icon error">!</div>
            <div>
              <div class="status-title">Payment could not be completed</div>
              <div class="status-sub">Please contact us on WhatsApp and share your order ID.</div>
            </div>
          </div>
          ${order.payment_error ? `<div class="script-box">${escapeHtml(order.payment_error)}</div>` : ""}
          <div class="order-id-row">Order ID: ${safeId}</div>`;
        return;
      }

      if (status === "pending" || status === "paid") {
        card.innerHTML = `
          <div class="status-row">
            <div class="status-icon warn">...</div>
            <div>
              <div class="status-title">${status === "paid" ? "Payment received" : "Waiting for approval"}</div>
              <div class="status-sub">${status === "paid" ? "Generation will start automatically soon." : "We will start processing your order soon."}</div>
            </div>
          </div>
          <div class="order-id-row">Order ID: ${safeId}</div>`;
        return;
      }

      if (status === "processing") {
        const currentStep = order.job_step || "analyzing";
        const stepIdx = Math.max(0, STEPS.findIndex(step => step.key === currentStep));
        const stepsHtml = STEPS.map((step, i) => {
          const cls = i < stepIdx ? "done" : i === stepIdx ? "active" : "";
          const prefix = i < stepIdx ? "Done: " : "";
          return `<div class="tl-step ${cls}">
            <div class="tl-dot"></div>
            <div>
              <div class="tl-label">${prefix}${escapeHtml(step.label)}</div>
              <div class="tl-sub">${escapeHtml(step.sub)}</div>
            </div>
          </div>`;
        }).join("");
        card.innerHTML = `
          <div class="status-row">
            <div class="status-icon"><div class="ring"></div></div>
            <div>
              <div class="status-title">Generating your creative</div>
              <div class="status-sub">This usually takes a few minutes. You can keep this page open.</div>
            </div>
          </div>
          <div class="timeline">${stepsHtml}</div>
          <div class="order-id-row">Order ID: ${safeId}</div>`;
        return;
      }

      if (status === "completed") {
        const heroPlatform = document.getElementById("hero-platform-share");
        const heroOrderId = document.getElementById("hero-order-id");
        const hasVideo = Boolean(order.video_url);
        const hasImage = Boolean(order.image_url);
        const isVideo = hasVideo;
        const mediaHtml = hasVideo
          ? `<video controls playsinline src="${escapeHtml(order.video_url)}"></video>`
          : hasImage
            ? `<img class="result-img" src="${escapeHtml(order.image_url)}" alt="Generated UGC creative" />`
            : "";
        const downloadUrl = order.video_url || order.image_url || "#";
        const downloadName = isVideo ? "vishleshak-ugc.mp4" : "vishleshak-ugc.jpg";
        const scriptHtml = order.script ? `<div class="script-box">${escapeHtml(order.script)}</div>` : "";
        const readyLabel = isVideo ? "Your video is ready" : "Your image is ready";
        const downloadLabel = isVideo ? "Download Video" : "Download Image";
        const readySub = isVideo
          ? "Download your video or copy the caption below."
          : "Download your image or copy the caption below.";
        card.innerHTML = `
          <div class="status-row">
            <div class="status-icon success">OK</div>
            <div>
              <div class="status-title">${readyLabel}</div>
              <div class="status-sub">${readySub}</div>
            </div>
          </div>
          ${mediaHtml}
          ${scriptHtml}
          <div class="action-row">
            <button class="btn btn-primary" onclick="blobDownload('${escapeHtml(downloadUrl)}','${downloadName}')">${downloadLabel}</button>
            ${order.script ? `<button class="btn btn-secondary" id="copy-caption-btn" type="button">Copy Caption</button>` : ""}
          </div>
          <div class="order-id-row">Order ID: ${safeId}</div>`;
        heroPlatform.innerHTML = platformShareHtml(order, downloadUrl, isVideo);
        const platformShare = heroPlatform.querySelector(".platform-share");
        if (platformShare) platformShare.classList.add("ready");
        heroOrderId.textContent = `Order ID: ${order.id || orderId}`;
        heroOrderId.classList.add("ready");
        if (order.script) {
          document.getElementById("copy-caption-btn").addEventListener("click", () => {
            navigator.clipboard.writeText(order.script).then(() => {
              const btn = document.getElementById("copy-caption-btn");
              btn.textContent = "Copied";
              setTimeout(() => { btn.textContent = "Copy Caption"; }, 2000);
            });
          });
        }
        return;
      }

      if (status === "rejected") {
        card.innerHTML = `
          <div class="status-row">
            <div class="status-icon error">!</div>
            <div>
              <div class="status-title">Order not accepted</div>
              <div class="status-sub">Please contact us on WhatsApp for assistance.</div>
            </div>
          </div>
          ${order.rejected_reason ? `<div class="script-box">Reason: ${escapeHtml(order.rejected_reason)}</div>` : ""}
          <div class="order-id-row">Order ID: ${safeId}</div>`;
        return;
      }

      if (status === "failed") {
        card.innerHTML = `
          <div class="status-row">
            <div class="status-icon error">!</div>
            <div>
              <div class="status-title">Generation failed</div>
              <div class="status-sub">Please contact us on WhatsApp and share your order ID.</div>
            </div>
          </div>
          ${order.error ? `<div class="script-box">${escapeHtml(order.error)}</div>` : ""}
          <div class="order-id-row">Order ID: ${safeId}</div>`;
      }
    }

    async function blobDownload(url, filename) {
      try {
        const resp = await fetch(url);
        const blob = await resp.blob();
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
      } catch (e) {
        window.open(url, "_blank");
      }
    }

    function renderError(message) {
      document.getElementById("status-card").innerHTML = `
        <div class="status-row">
          <div class="status-icon error">!</div>
          <div>
            <div class="status-title">Order not found</div>
            <div class="status-sub">${escapeHtml(message)}</div>
          </div>
        </div>
        <div class="script-box">
          Your creative may still be processing. Please WhatsApp us at +91 99539 10987 and share your Order ID.
        </div>
        <div class="order-id-row">Order ID: ${escapeHtml(orderId)}</div>`;
    }

    poll();
    pollTimer = setInterval(poll, 5000);
  </script>
</body>
</html>
